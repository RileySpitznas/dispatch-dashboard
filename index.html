<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DispatchIQ</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0c0c0c;--bg1:#131313;--bg2:#1a1a1a;--border:#242424;--text:#e8e8e8;--text2:#777;--text3:#3f3f3f;
--accent:#e8650a;--red:#e05252;--green:#4caf7d;--blue:#5b8dee;--yellow:#e8a020;
--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px}
.top{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px}
.brand{display:flex;align-items:center;gap:8px;font-weight:600}
.brand i{width:26px;height:26px;background:var(--accent);border-radius:6px;display:inline-block}
.num{font-family:var(--mono);color:var(--accent);font-size:15px}
.right{display:flex;align-items:center;gap:10px}
.ghost{background:none;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:6px 12px;font-family:var(--font);font-size:12px;cursor:pointer}
/* toggle */
.tog{display:flex;align-items:center;gap:9px;background:var(--bg1);border:1px solid var(--border);border-radius:10px;padding:7px 12px;cursor:pointer;user-select:none}
.tog .lab{font-family:var(--mono);font-size:11px;letter-spacing:.5px;color:var(--text2)}
.tog .state{font-family:var(--mono);font-size:11px;font-weight:600}
.tog .pill{width:34px;height:18px;border-radius:10px;background:var(--bg2);border:1px solid var(--border);position:relative;transition:.15s}
.tog .pill::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:var(--text2);transition:.15s}
.tog.on .pill{background:rgba(232,101,10,.25);border-color:var(--accent)}
.tog.on .pill::after{left:18px;background:var(--accent)}
.tog.on .state{color:var(--accent)}
.tog:not(.on) .state{color:var(--text2)}
.counts{display:flex;gap:18px;padding:10px 22px;font-family:var(--mono);font-size:11.5px;color:var(--text2);border-bottom:1px solid var(--border)}
.counts b{color:var(--text);font-weight:500}
.feed{max-width:860px;margin:0 auto;padding:14px 22px}
.lead{display:flex;gap:12px;padding:13px 4px;border-bottom:1px solid #161616;align-items:flex-start}
.bar{width:3px;align-self:stretch;border-radius:2px;background:var(--accent)}
.bar.em{background:var(--red)} .bar.disp{background:var(--blue)} .bar.res{background:var(--text3)}
.lead .body{flex:1;min-width:0}
.nm{font-weight:500;display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.tag{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:3px;letter-spacing:.4px}
.tag.em{background:rgba(224,82,82,.1);color:var(--red)}
.tag.voice{background:rgba(232,101,10,.1);color:var(--accent)}
.tag.missed_call,.tag.sms{background:rgba(232,160,32,.1);color:var(--yellow)}
.tag.chat,.tag.form{background:rgba(91,141,238,.1);color:var(--blue)}
.addr{font-size:11.5px;color:var(--text3);margin:2px 0}
.prob{font-size:12.5px;color:var(--text2)}
.meta{text-align:right;flex-shrink:0}
.when{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:6px}
.st{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:3px}
.st.new{background:rgba(232,101,10,.1);color:var(--accent)}
.st.dispatched{background:rgba(91,141,238,.1);color:var(--blue)}
.st.resolved{background:rgba(76,175,125,.1);color:var(--green)}
.act{display:block;margin:6px 0 0 auto;border:1px solid var(--border);background:none;border-radius:6px;padding:4px 10px;font-size:11px;font-family:var(--font);cursor:pointer}
.act.d{color:var(--blue);border-color:rgba(91,141,238,.3)} .act.r{color:var(--green);border-color:rgba(76,175,125,.3)}
.empty{padding:46px;text-align:center;color:var(--text3);font-size:12px}
/* modal */
.mw{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:50;align-items:center;justify-content:center}
.mw.open{display:flex}
.mo{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:20px;width:min(380px,calc(100% - 36px))}
.mo h3{font-size:14px;margin-bottom:12px}
.crew{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:9px;margin-bottom:7px;cursor:pointer;background:var(--bg2)}
.crew:hover{border-color:var(--blue)}
.crew.busy{opacity:.35;cursor:default}
.crew .cn{font-size:13px;font-weight:500}.crew .cr{font-size:11px;color:var(--text3)}
.crew .cd{margin-left:auto;font-family:var(--mono);font-size:11.5px;text-align:right}
.crew .cd small{display:block;color:var(--text3);font-size:10px}
.cancel{width:100%;background:none;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:8px;font-size:12px;cursor:pointer;margin-top:6px;font-family:var(--font)}
.ok{text-align:center;padding:22px 0 14px}
.ok .big{font-size:32px;margin-bottom:8px}
.ok .t{font-weight:600;margin-bottom:4px}.ok .s{font-size:12px;color:var(--text2)}
</style>
</head>
<body>

<div class="top">
  <div class="brand"><i></i>DispatchIQ <span style="font-family:var(--mono);font-size:11px;color:var(--text3)">/ demo</span></div>
  <div class="num">+1 (215) 874-0980</div>
  <div class="right">
    <div class="tog on" id="tog" title="ON: AI answers calls. OFF: calls ring through; missed calls get an automatic text back.">
      <span class="lab">AI COVERAGE</span><span class="pill"></span><span class="state" id="togState">ON</span>
    </div>
    <button class="ghost" onclick="resetDemo()">Reset</button>
  </div>
</div>

<div class="counts">
  <span>active <b id="cA">0</b></span>
  <span>emergencies <b id="cE">0</b></span>
  <span>dispatched <b id="cD">0</b></span>
  <span>resolved <b id="cR">0</b></span>
</div>

<div class="feed" id="feed"></div>

<div class="mw" id="mw"><div class="mo" id="mo"></div></div>

<script>
const URL_ = 'https://ampuejhdkgvjttvlkayc.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtcHVlamhka2d2anR0dmxrYXljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTc2MzMsImV4cCI6MjA5MzQzMzYzM30.T4nFUlCTiapCx8kxr7sOo2zlKgKg-VlmaYNZXQNC7UU';
const H = { apikey: KEY, Authorization: 'Bearer ' + KEY, 'Content-Type': 'application/json' };

const CREW = [
  {id:'c1',name:'Sam Okafor',role:'Plumber',dist:1.2,eta:4,busy:false},
  {id:'c2',name:'Tanya Brown',role:'General Tech',dist:2.7,eta:8,busy:false},
  {id:'c3',name:'Luis Vega',role:'Restoration',dist:3.9,eta:12,busy:false},
  {id:'c4',name:'Mike Rossi',role:'HVAC Tech',dist:2.1,eta:6,busy:true},
];

let tenantId = null, leads = [], known = new Set(), statusOverride = {};

function ago(iso){const m=Math.floor((Date.now()-new Date(iso))/60000);
  return m<1?'now':m<60?m+'m':Math.floor(m/60)+'h';}

function render(){
  const f = document.getElementById('feed');
  if(!leads.length){ f.innerHTML = '<div class="empty">No leads yet — call the number above.</div>'; }
  else f.innerHTML = leads.map(l=>{
    const st = statusOverride[l.id] || l.status;
    const bar = st==='resolved'?'res':st==='dispatched'?'disp':l.is_emergency?'em':'';
    return `<div class="lead">
      <div class="bar ${bar}"></div>
      <div class="body">
        <div class="nm">${l.caller_name||'Unknown caller'}
          ${l.is_emergency?'<span class="tag em">EMERGENCY</span>':''}
          <span class="tag ${l.channel}">${l.channel.replace('_',' ')}</span></div>
        <div class="addr">${l.service_address||(l.callback_phone||'')}</div>
        <div class="prob">${l.problem_description||''}</div>
      </div>
      <div class="meta">
        <div class="when">${ago(l.created_at)}</div>
        <span class="st ${st}">${st}</span>
        ${st==='new'?`<button class="act d" data-id="${l.id}" data-k="d">Dispatch</button>`:''}
        ${st==='dispatched'?`<button class="act r" data-id="${l.id}" data-k="r">Resolve</button>`:''}
      </div></div>`;
  }).join('');
  f.querySelectorAll('.act').forEach(b=>b.addEventListener('click',function(){
    this.dataset.k==='d' ? openModal(this.dataset.id) : setStatus(this.dataset.id,'resolved');
  }));
  const c = s => leads.filter(l=>(statusOverride[l.id]||l.status)===s).length;
  document.getElementById('cA').textContent=c('new');
  document.getElementById('cE').textContent=leads.filter(l=>l.is_emergency&&(statusOverride[l.id]||l.status)!=='resolved').length;
  document.getElementById('cD').textContent=c('dispatched');
  document.getElementById('cR').textContent=c('resolved');
}

async function setStatus(id,status){
  statusOverride[id]=status; render();
  await fetch(`${URL_}/rest/v1/dispatch_leads?id=eq.${id}`,{method:'PATCH',headers:H,body:JSON.stringify({status})}).catch(()=>{});
}

function openModal(id){
  const mo=document.getElementById('mo');
  const sorted=[...CREW].sort((a,b)=>(a.busy-b.busy)||(a.dist-b.dist));
  mo.innerHTML='<h3>Dispatch a technician</h3>'+sorted.map(c=>
    `<div class="crew ${c.busy?'busy':''}" data-c="${c.id}">
      <div><div class="cn">${c.name}</div><div class="cr">${c.role}${c.busy?' · on job':''}</div></div>
      <div class="cd">${c.dist} mi<small>~${c.eta} min</small></div></div>`).join('')+
    '<button class="cancel" id="x">Cancel</button>';
  document.getElementById('x').onclick=close;
  mo.querySelectorAll('.crew:not(.busy)').forEach(el=>el.onclick=()=>{
    const c=CREW.find(k=>k.id===el.dataset.c); c.busy=true;
    setStatus(id,'dispatched');
    mo.innerHTML=`<div class="ok"><div class="big">✓</div><div class="t">Dispatch confirmed</div>
      <div class="s">${c.name} is on the way — ETA ~${c.eta} min</div></div>
      <button class="cancel" id="x2">Done</button>`;
    document.getElementById('x2').onclick=close;
  });
  document.getElementById('mw').classList.add('open');
}
function close(){document.getElementById('mw').classList.remove('open');}
document.getElementById('mw').addEventListener('click',e=>{if(e.target.id==='mw')close();});

// ---- coverage toggle (writes tenants.coverage_mode) ----
const tog=document.getElementById('tog');
tog.addEventListener('click', async ()=>{
  const on=!tog.classList.contains('on');
  tog.classList.toggle('on',on);
  document.getElementById('togState').textContent=on?'ON':'OFF';
  if(tenantId) await fetch(`${URL_}/rest/v1/dispatch_tenants?id=eq.${tenantId}`,
    {method:'PATCH',headers:H,body:JSON.stringify({coverage_mode:on?'on':'off'})}).catch(()=>{});
});

async function loadTenant(){
  const r=await fetch(`${URL_}/rest/v1/dispatch_tenants?select=id,coverage_mode&limit=1`,{headers:H});
  const rows=await r.json();
  if(rows?.[0]){ tenantId=rows[0].id;
    const on=rows[0].coverage_mode==='on';
    tog.classList.toggle('on',on);
    document.getElementById('togState').textContent=on?'ON':'OFF'; }
}

async function poll(){
  try{
    const r=await fetch(`${URL_}/rest/v1/dispatch_leads?order=created_at.desc&limit=50`,{headers:H});
    if(!r.ok)return;
    const rows=await r.json();
    let changed=rows.length!==leads.length;
    rows.forEach(x=>{if(!known.has(x.id)){known.add(x.id);changed=true;}});
    leads=rows;
    if(changed)render();
  }catch(e){}
}

async function resetDemo(){
  await fetch(`${URL_}/rest/v1/dispatch_leads?channel=neq.keep&id=gt.1`,{method:'DELETE',headers:H}).catch(()=>{});
  statusOverride={}; CREW.forEach(c=>c.busy=c.id==='c4'); known=new Set(); leads=[];
  poll();
}

loadTenant(); poll(); setInterval(poll,5000); setInterval(render,60000);
</script>
</body>
</html>
