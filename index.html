<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DispatchIQ</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FFFFFF;--bg2:#F3FAF9;--line:#D6E6E4;
  --ink:#0A2E36;--ink2:#5B7377;--ink3:#9AB0AE;
  --teal:#0E7C7B;--teal2:#14B8A6;
  --red:#C2453F;--redbg:#FBEFEE;
  --blue:#3D6B9E;--bluebg:#EEF4FA;
  --green:#2E7D5B;--greenbg:#ECF6F1;
  --amber:#9A6B15;--amberbg:#FAF3E5;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
body{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:14px}
.top{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--line);flex-wrap:wrap;gap:12px}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px}
.brand i{width:24px;height:24px;background:var(--teal);border-radius:6px;display:inline-block}
.brand small{font-family:var(--mono);font-size:10px;color:var(--ink3);font-weight:400}
.num{font-family:var(--mono);color:var(--teal);font-size:15px;font-weight:500}
.right{display:flex;align-items:center;gap:10px}
.ghost{background:none;border:1px solid var(--line);color:var(--ink2);border-radius:8px;padding:7px 13px;font-family:var(--font);font-size:12px;cursor:pointer}
.ghost:hover{border-color:var(--ink3)}
.tog{display:flex;align-items:center;gap:9px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:8px 13px;cursor:pointer;user-select:none}
.tog .lab{font-family:var(--mono);font-size:10.5px;letter-spacing:.5px;color:var(--ink2)}
.tog .state{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--ink3)}
.tog .pill{width:34px;height:18px;border-radius:10px;background:#E3EDEC;border:1px solid var(--line);position:relative;transition:.15s}
.tog .pill::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#fff;border:1px solid var(--line);transition:.15s}
.tog.on .pill{background:var(--teal2);border-color:var(--teal2)}
.tog.on .pill::after{left:17px;border-color:#fff}
.tog.on .state{color:var(--teal)}
.counts{display:flex;gap:20px;padding:11px 24px;font-family:var(--mono);font-size:11.5px;color:var(--ink2);border-bottom:1px solid var(--line);background:var(--bg2)}
.counts b{color:var(--ink);font-weight:500}
.feed{max-width:880px;margin:0 auto;padding:8px 24px 40px}
.lead{display:flex;gap:14px;padding:16px 2px;border-bottom:1px solid #EAF2F1;align-items:flex-start}
.lead .body{flex:1;min-width:0}
.nm{font-weight:600;display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:14.5px}
.tag{font-family:var(--mono);font-size:9.5px;padding:2px 7px;border-radius:4px;letter-spacing:.3px;font-weight:500}
.tag.em{background:var(--redbg);color:var(--red)}
.tag.voice{background:var(--bg2);color:var(--teal)}
.tag.missed_call,.tag.sms{background:var(--amberbg);color:var(--amber)}
.tag.chat,.tag.form{background:var(--bluebg);color:var(--blue)}
.addr{font-size:12px;color:var(--ink3);margin:3px 0 2px}
.prob{font-size:13px;color:var(--ink2);line-height:1.45}
.meta{text-align:right;flex-shrink:0}
.when{font-family:var(--mono);font-size:10px;color:var(--ink3);margin-bottom:6px}
.st{font-family:var(--mono);font-size:9.5px;padding:2px 7px;border-radius:4px;font-weight:500}
.st.new{background:var(--bg2);color:var(--teal)}
.st.dispatched{background:var(--bluebg);color:var(--blue)}
.st.resolved{background:var(--greenbg);color:var(--green)}
.act{display:block;margin:8px 0 0 auto;border-radius:7px;padding:5px 12px;font-size:12px;font-family:var(--font);font-weight:500;cursor:pointer;border:1px solid var(--line);background:#fff}
.act.d{color:var(--teal);border-color:#BBDEDA}
.act.d:hover{background:var(--bg2)}
.act.r{color:var(--green);border-color:#C4E2D3}
.act.r:hover{background:var(--greenbg)}
.empty{padding:56px;text-align:center;color:var(--ink3);font-size:13px}
.mw{display:none;position:fixed;inset:0;background:rgba(10,46,54,.32);z-index:50;align-items:center;justify-content:center}
.mw.open{display:flex}
.mo{background:#fff;border:1px solid var(--line);border-radius:14px;padding:22px;width:min(380px,calc(100% - 36px));box-shadow:0 12px 40px rgba(10,46,54,.12)}
.mo h3{font-size:15px;margin-bottom:14px;font-weight:600}
.crew{display:flex;align-items:center;gap:10px;padding:11px 13px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;cursor:pointer;background:#fff}
.crew:hover{border-color:var(--teal2);background:var(--bg2)}
.crew.busy{opacity:.4;cursor:default}
.crew.busy:hover{border-color:var(--line);background:#fff}
.crew .cn{font-size:13.5px;font-weight:600}.crew .cr{font-size:11.5px;color:var(--ink3)}
.crew .cd{margin-left:auto;font-family:var(--mono);font-size:12px;text-align:right;color:var(--ink)}
.crew .cd small{display:block;color:var(--ink3);font-size:10px}
.cancel{width:100%;background:none;border:1px solid var(--line);color:var(--ink2);border-radius:9px;padding:9px;font-size:12.5px;cursor:pointer;margin-top:6px;font-family:var(--font)}
.cancel:hover{border-color:var(--ink3)}
.ok{text-align:center;padding:24px 0 16px}
.ok .big{width:46px;height:46px;border-radius:50%;background:var(--greenbg);color:var(--green);font-size:22px;line-height:46px;margin:0 auto 12px}
.ok .t{font-weight:600;margin-bottom:4px;font-size:15px}.ok .s{font-size:12.5px;color:var(--ink2)}
</style>
</head>
<body>

<div class="top">
  <div class="brand"><i></i>DispatchIQ <small>RECEPTION · DEMO</small></div>
  <div class="num">+1 (215) 874-0980</div>
  <div class="right">
    <div class="tog on" id="tog" title="ON: AI answers calls. OFF: calls ring through; missed calls get an automatic text back.">
      <span class="lab">AI COVERAGE</span><span class="pill"></span><span class="state" id="togState">ON</span>
    </div>
    <button class="ghost" onclick="resetDemo()">Reset</button>
  </div>
</div>

<div class="counts">
  <span>active <b id="cA">0</b></span>
  <span>emergencies <b id="cE">0</b></span>
  <span>dispatched <b id="cD">0</b></span>
  <span>resolved <b id="cR">0</b></span>
</div>

<div class="feed" id="feed"></div>

<div class="mw" id="mw"><div class="mo" id="mo"></div></div>

<script>
const URL_ = 'https://ampuejhdkgvjttvlkayc.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtcHVlamhka2d2anR0dmxrYXljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTc2MzMsImV4cCI6MjA5MzQzMzYzM30.T4nFUlCTiapCx8kxr7sOo2zlKgKg-VlmaYNZXQNC7UU';
const H = { apikey: KEY, Authorization: 'Bearer ' + KEY, 'Content-Type': 'application/json' };

const CREW = [
  {id:'c1',name:'Sam Okafor',role:'Plumber',dist:1.2,eta:4,busy:false},
  {id:'c2',name:'Tanya Brown',role:'General Tech',dist:2.7,eta:8,busy:false},
  {id:'c3',name:'Luis Vega',role:'Restoration',dist:3.9,eta:12,busy:false},
  {id:'c4',name:'Mike Rossi',role:'HVAC Tech',dist:2.1,eta:6,busy:true},
];

let tenantId = null, leads = [], known = new Set(), statusOverride = {};

function ago(iso){const m=Math.floor((Date.now()-new Date(iso))/60000);
  return m<1?'now':m<60?m+'m':Math.floor(m/60)+'h';}

function render(){
  const f = document.getElementById('feed');
  if(!leads.length){ f.innerHTML = '<div class="empty">No leads yet — call the number above.</div>'; }
  else f.innerHTML = leads.map(l=>{
    const st = statusOverride[l.id] || l.status;
    return `<div class="lead">
      <div class="body">
        <div class="nm">${l.caller_name||'Unknown caller'}
          ${l.is_emergency?'<span class="tag em">EMERGENCY</span>':''}
          <span class="tag ${l.channel}">${l.channel.replace('_',' ')}</span></div>
        <div class="addr">${l.service_address||(l.callback_phone||'')}</div>
        <div class="prob">${l.problem_description||''}</div>
      </div>
      <div class="meta">
        <div class="when">${ago(l.created_at)}</div>
        <span class="st ${st}">${st}</span>
        ${st==='new'?`<button class="act d" data-id="${l.id}" data-k="d">Dispatch</button>`:''}
        ${st==='dispatched'?`<button class="act r" data-id="${l.id}" data-k="r">Resolve</button>`:''}
      </div></div>`;
  }).join('');
  f.querySelectorAll('.act').forEach(b=>b.addEventListener('click',function(){
    this.dataset.k==='d' ? openModal(this.dataset.id) : setStatus(this.dataset.id,'resolved');
  }));
  const c = s => leads.filter(l=>(statusOverride[l.id]||l.status)===s).length;
  document.getElementById('cA').textContent=c('new');
  document.getElementById('cE').textContent=leads.filter(l=>l.is_emergency&&(statusOverride[l.id]||l.status)!=='resolved').length;
  document.getElementById('cD').textContent=c('dispatched');
  document.getElementById('cR').textContent=c('resolved');
}

async function setStatus(id,status){
  statusOverride[id]=status; render();
  await fetch(`${URL_}/rest/v1/dispatch_leads?id=eq.${id}`,{method:'PATCH',headers:H,body:JSON.stringify({status})}).catch(()=>{});
}

function openModal(id){
  const mo=document.getElementById('mo');
  const sorted=[...CREW].sort((a,b)=>(a.busy-b.busy)||(a.dist-b.dist));
  mo.innerHTML='<h3>Dispatch a technician</h3>'+sorted.map(c=>
    `<div class="crew ${c.busy?'busy':''}" data-c="${c.id}">
      <div><div class="cn">${c.name}</div><div class="cr">${c.role}${c.busy?' · on job':''}</div></div>
      <div class="cd">${c.dist} mi<small>~${c.eta} min</small></div></div>`).join('')+
    '<button class="cancel" id="x">Cancel</button>';
  document.getElementById('x').onclick=close;
  mo.querySelectorAll('.crew:not(.busy)').forEach(el=>el.onclick=()=>{
    const c=CREW.find(k=>k.id===el.dataset.c); c.busy=true;
    setStatus(id,'dispatched');
    mo.innerHTML=`<div class="ok"><div class="big">✓</div><div class="t">Dispatch confirmed</div>
      <div class="s">${c.name} is on the way — ETA ~${c.eta} min</div></div>
      <button class="cancel" id="x2">Done</button>`;
    document.getElementById('x2').onclick=close;
  });
  document.getElementById('mw').classList.add('open');
}
function close(){document.getElementById('mw').classList.remove('open');}
document.getElementById('mw').addEventListener('click',e=>{if(e.target.id==='mw')close();});

const tog=document.getElementById('tog');
tog.addEventListener('click', async ()=>{
  const on=!tog.classList.contains('on');
  tog.classList.toggle('on',on);
  document.getElementById('togState').textContent=on?'ON':'OFF';
  if(tenantId) await fetch(`${URL_}/rest/v1/dispatch_tenants?id=eq.${tenantId}`,
    {method:'PATCH',headers:H,body:JSON.stringify({coverage_mode:on?'on':'off'})}).catch(()=>{});
});

async function loadTenant(){
  const r=await fetch(`${URL_}/rest/v1/dispatch_tenants?select=id,coverage_mode&limit=1`,{headers:H});
  const rows=await r.json();
  if(rows?.[0]){ tenantId=rows[0].id;
    const on=rows[0].coverage_mode==='on';
    tog.classList.toggle('on',on);
    document.getElementById('togState').textContent=on?'ON':'OFF'; }
}

async function poll(){
  try{
    const r=await fetch(`${URL_}/rest/v1/dispatch_leads?order=created_at.desc&limit=50`,{headers:H});
    if(!r.ok)return;
    const rows=await r.json();
    let changed=rows.length!==leads.length;
    rows.forEach(x=>{if(!known.has(x.id)){known.add(x.id);changed=true;}});
    leads=rows;
    if(changed)render();
  }catch(e){}
}

async function resetDemo(){
  await fetch(`${URL_}/rest/v1/dispatch_leads?id=gt.3`,{method:'DELETE',headers:H}).catch(()=>{});
  statusOverride={}; CREW.forEach(c=>c.busy=c.id==='c4'); known=new Set(); leads=[];
  poll();
}

loadTenant(); poll(); setInterval(poll,5000); setInterval(render,60000);
</script>
</body>
</html>
